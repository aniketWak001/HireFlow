name: CI

on:
    push:
    pull_request:

jobs:
    test:
        runs-on: ubuntu-latest

        defaults:
            run:
                working-directory: api
        
        steps:
            - uses: action/checkout@v4

            - uses: actions/setup-node@v4
              with:
                node-vertion: 20
            - run: npm ci
            - run: npm test 

